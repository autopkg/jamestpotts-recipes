Description: Downloads ipMIDI to be built into an installer package
Identifier: com.github.jamestpotts-recipes.pkg.ipMIDI
ParentRecipe: com.github.jamestpotts-recipes.download.ipMIDI
 
Input:
  NAME: ipMIDI
  STATIC_URL: https://nerds.de

Process:
  - Processor: Copier
    Arguments:
      source_path: "%RECIPE_CACHE_DIR%/downloads/%NAME%.pkg"
      destination_path: "%RECIPE_CACHE_DIR%/%bundle_name%-%bundle_version%.pkg"

