Description: Downloads McDSP 6020 Ultimate EQ to be built into an installer package
Identifier: com.github.jamestpotts-recipes.pkg.McDSP 6020 Ultimate EQ
ParentRecipe: com.github.jamestpotts-recipes.download.McDSP 6020 Ultimate EQ
 
Input:
  NAME: McDSP 4040 Retro Limiter
  STATIC_URL: https://mcdsp.com

Process:
  - Processor: FileFinder
    Arguments:
      pattern: "%RECIPE_CACHE_DIR%/package/*.pkg"

  - Processor: Copier
    Arguments:
      source_path: "%found_filename%"
      destination_path: "%RECIPE_CACHE_DIR%/McDSP-%bundle_name%-%bundle_version%.pkg"